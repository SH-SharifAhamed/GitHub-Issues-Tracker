<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>GitHub Issues Tracker</title>

     <!-- daisyUI and Tailwind CSS cdn links -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- favicon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

     <!-- tailwind config -->
     <link rel="stylesheet" href="./tailwind.config.js">

     <style>
     body {
          font-family: "Geist", sans-serif;
     }
     </style>

</head>
<body class="bg-[#F8FAFC]">

    <!-- login from github -->
     <section class="min-h-screen flex items-center justify-center">
          <div class="max-w-md  border-base-300 bg-white shadow-md rounded-box border py-4 px-10 mx-auto transition-all duration-300 hover:shadow-2xl hover:scale-[1.01]">
          
               <div class="flex flex-col gap-2 mb-4">
                    <img class="w-16 mx-auto" src="./assets/github-logo.png" alt="">
                    <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
                    <p class="text-center text-[#64748B]">Sign in to manage your issues</p>
               </div>
          
               <fieldset class="fieldset items-center w-xs mx-auto">
                    <label class="label text-[16px] font-bold text-black">Username</label>
                    <input id="username" type="text" class="input" placeholder="Enter Username" />
          
                    <label class="label text-[16px] font-bold text-black">Password</label>
                    <input id="password" type="password" class="input" placeholder="Enter Password" />
          
                    <button id="login-btn" class="btn btn-primary mt-4 text-[16px] font-bold transition duration-300 hover:bg-blue-600 hover:text-white">Sign In</button>
               </fieldset>
          
               <div class="flex items-center justify-center mt-6">
                    <div class="w-1/3 border-t border-gray-300"></div>
                    <p class="mx-4 text-black">OR</p>
                    <div class="w-1/3 border-t border-gray-300"></div>
               </div>
          
               <div class="gap-2 mt-6">
                    <p class="text-[#64748B] mb-6 text-center">Demo Credentials:</p>
                    <p class="text-center"><span class="font-bold">Username:</span> admin</p>
                    <p class="text-center"><span class="font-bold">Password:</span> admin123</p>
               </div>
          </div>
     </section>

     <script src="script/login.js"></script>
</body>
</html>
