<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>

     <!-- daisyUI and Tailwind CSS cdn links -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- font awesome cdn link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />


     <!-- favicon -->
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

     <!-- tailwind config -->
     <link rel="stylesheet" href="./tailwind.config.js">

     <style>
          body {
               font-family: "Geist", sans-serif;
          }
     </style>
</head>

<body class="bg-[#F8FAFC]">
     <!-- navgation bar -->
     <nav class="navbar bg-base-100 shadow-sm">
          <div class="flex-1 justify-between gap-2">
               <a class="flex gap-2" href="home.html">
                    <img class="h-8 w-8" src="./assets/github-logo.png" alt="GitHub Logo">
                    <p class="text-2xl font-semibold">GitHub Issues Tracker</p>
               </a>
          </div>
          <div class="flex gap-2">
               <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
               <div id="searchCardContainer" class="dropdown dropdown-end">
               </div>
               <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
          </div>
     </nav>

     <section class="category w-10/12 mx-auto mt-[60px] bg-white shadow-md">
          <button id="allBtn" class="btn tab-btn bg-[#4A00FF] text-white px-4 py-2 rounded" onclick="showAll()">All</button>
          <button id="openBtn" class="btn tab-btn bg-gray-200 text-[#64748B] px-4 py-2 rounded" onclick="showOpen()">Open</button>
          <button id="closedBtn" class="btn tab-btn bg-gray-200 text-[#64748B] px-4 py-2 rounded" onclick="showClosed()">Closed</button>
     </section>

     <section class="w-10/12 mx-auto mt-[60px] bg-white shadow-md">
          <div class="flex items-center justify-between p-4">
               <div class="flex items-center gap-4 p-4">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                         <h3 id="issueCount" class="font-bold">50 Issues</h3>
                         <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
               </div>
               <div class="flex items-center gap-4 p-4">
                    <p><span class="inline-block w-3 h-3 bg-[#00A96E] rounded-full"></span> Open</p>
                    <p><span class="inline-block w-3 h-3 bg-[#A855F7] rounded-full"></span> Closed</p>
               </div>
          </div>
          <hr>

          <!-- All card container -->
          <div class="p-4 mt-4">
               <!-- <div id="cardContainer" class="card-1 rounded-lg p-4 mb-4 bg-[#F1F5F9] shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300">
                    
               </div> -->
               <div id="cardContainer" class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

               <!-- loading spinner -->
               <div id="loadingSpinner" class="h-[60vh] hidden flex fle justify-center items-center">
                    <span class="loading loading-spinner loading-sm"></span>
               </div>
          </div>
     </section>

     <section>
          <!-- Open the modal using ID.showModal() method -->

          <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
               <div class="modal-box">

                    <div id="details-container">
                        

                    </div>

                    <div class="modal-action">
                         <form method="dialog">
                              <!-- if there is a button in form, it will close the modal -->
                              <button class="btn">Close</button>
                         </form>
                    </div>
               </div>
          </dialog>
     </section>


     <script src="./script/home.js"></script>
</body>

</html>
